<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn thuốc - Hệ thống Quản lý</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <h4>Quản lý BN</h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="index.html"><i class="fas fa-tachometer-alt"></i> Trang chủ</a>

            <a class="nav-link" href="patients.html"><i class="fas fa-hospital-user"></i> Bệnh nhân</a>
            <a class="nav-link active" href="prescriptions.html"><i class="fas fa-prescription-bottle-alt"></i> Đơn thuốc</a>
            <a class="nav-link" href="drugs.html"><i class="fas fa-pills"></i> Tủ thuốc</a>
         
            <a class="nav-link" href="reports.html"><i class="fas fa-chart-line"></i> Báo cáo</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <button class="btn btn-link" id="toggleSidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="ms-auto d-flex align-items-center">
                <div class="dropdown">
                    <button class="btn btn-link dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle"></i> BS. Nguyễn Nam
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="fas fa-cog"></i> Cài đặt</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="container-fluid p-4">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                    <li class="breadcrumb-item">Thuốc</li>
                    <li class="breadcrumb-item active">Đơn thuốc</li>
                </ol>
            </nav>

            <!-- Prescription List Card -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div>
                        <h3 class="mb-1">Đơn thuốc</h3>
                        <p class="text-muted mb-0 small">Danh sách đơn thuốc của bạn</p>
                    </div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPrescriptionModal">
                        <i class="fas fa-plus"></i> Tạo đơn thuốc mới
                    </button>
                </div>
                <div class="card-body">
                    <!-- Filter Row -->
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <input type="text" 
                                   class="form-control form-control-sm" 
                                   id="dateRangePicker" 
                                   placeholder="Chọn khoảng thời gian"
                                   readonly>
                        </div>
                        <div class="col-md-9 text-end">
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-primary" id="btnCopy">
                                    <i class="fas fa-copy"></i> Sao chép
                                </button>
                                <button type="button" class="btn btn-outline-success" id="btnExcel">
                                    <i class="fas fa-file-excel"></i> Excel
                                </button>
                                <button type="button" class="btn btn-outline-danger" id="btnPDF">
                                    <i class="fas fa-file-pdf"></i> PDF
                                </button>
                                <button type="button" class="btn btn-outline-info" id="btnPrint">
                                    <i class="fas fa-print"></i> In đơn thuốc
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Table -->
                    <table id="prescriptionTable" class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Ngày</th>
                                <th>Họ & Tên</th>
                                <th>Giới</th>
                                <th>Năm sinh</th>
                                <th>Chẩn đoán</th>
                                <th>Thuốc</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Sample data -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Prescription Modal -->
    <div class="modal fade" id="addPrescriptionModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tạo đơn thuốc mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPrescriptionForm">
                        <!-- Patient Info -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Bệnh nhân <span class="text-danger">*</span></label>
                                <select class="form-select" name="patient_id" required>
                                    <option value="">-- Chọn bệnh nhân --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ngày kê đơn</label>
                                <input type="date" class="form-control" name="prescription_date" value="">
                            </div>
                        </div>

                        <!-- Diagnosis -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Chẩn đoán <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="diagnosis" placeholder="Nhập chẩn đoán bệnh" required>
                        </div>

                        <!-- Medications -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Danh sách thuốc</label>
                            <div id="medicationList">
                                <div class="medication-item border rounded p-3 mb-3">
                                    <div class="row">
                                        <div class="col-md-4 mb-2">
                                            <label class="form-label small">Tên thuốc</label>
                                            <input type="text" class="form-control form-control-sm" name="drug_name[]" placeholder="Paracetamol">
                                        </div>
                                        <div class="col-md-2 mb-2">
                                            <label class="form-label small">Số lượng</label>
                                            <input type="number" class="form-control form-control-sm" name="quantity[]" placeholder="10">
                                        </div>
                                        <div class="col-md-2 mb-2">
                                            <label class="form-label small">Đơn vị</label>
                                            <select class="form-select form-select-sm" name="unit[]">
                                                <option>Viên</option>
                                                <option>Vỉ</option>
                                                <option>Hộp</option>
                                                <option>Chai</option>
                                                <option>Ống</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4 mb-2">
                                            <label class="form-label small">Cách dùng</label>
                                            <input type="text" class="form-control form-control-sm" name="usage[]" placeholder="Ngày 2 lần, sáng chiều">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-primary" id="addMedicationBtn">
                                <i class="fas fa-plus"></i> Thêm thuốc
                            </button>
                        </div>

                        <!-- Notes -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ghi chú</label>
                            <textarea class="form-control" name="notes" rows="2" placeholder="Lời dặn thêm cho bệnh nhân..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="savePrescription()">Lưu đơn thuốc</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
    <script src="script.js"></script>
    <script src="prescriptions.js"></script>
</body>
</html>
